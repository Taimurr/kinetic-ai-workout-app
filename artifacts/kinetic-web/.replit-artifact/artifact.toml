kind = "web"
previewPath = "/"
title = "Kinetic"
version = "1.0.0"
id = "artifacts/kinetic-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21400

[services.development]
run = "pnpm --filter @workspace/kinetic-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kinetic-web", "run", "build" ]
publicDir = "artifacts/kinetic-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21400"
BASE_PATH = "/"
