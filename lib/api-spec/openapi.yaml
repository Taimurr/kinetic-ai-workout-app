openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Kinetic API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: plans
    description: Workout plan generation
  - name: profile
    description: User profile management
  - name: sessions
    description: Workout session logging
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate-plan:
    post:
      operationId: generatePlan
      tags: [plans]
      summary: Generate a personalized weekly workout plan via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanBody"
      responses:
        "200":
          description: Generated weekly plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Unauthorized
    post:
      operationId: saveProfile
      tags: [profile]
      summary: Save or update user profile and generate plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanBody"
      responses:
        "200":
          description: Profile saved, plan returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          description: Unauthorized
  /plan:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get the authenticated user's current weekly plan (with progression weights applied)
      responses:
        "200":
          description: Current plan with progression
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          description: Unauthorized
        "404":
          description: No plan found
  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: Get all workout sessions for the authenticated user
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResponse"
        "401":
          description: Unauthorized
    post:
      operationId: logSession
      tags: [sessions]
      summary: Log a completed workout session and apply progression rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogSessionBody"
      responses:
        "200":
          description: Session logged, progression applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogSessionResponse"
        "401":
          description: Unauthorized
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to returnTo on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to OIDC logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '500':
          description: Token exchange failed.
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GeneratePlanBody:
      type: object
      properties:
        goal:
          type: string
          enum: [strength, muscle_gain, weight_loss, general_fitness]
        experience_level:
          type: string
          enum: [beginner, some_experience, intermediate]
        equipment:
          type: string
          enum: [full_gym, dumbbells_only, barbells_and_dumbbells, bodyweight_only]
        time_per_workout:
          type: integer
          enum: [30, 45, 60, 75]
        days_per_week:
          type: integer
          enum: [2, 3, 4, 5]
      required:
        - goal
        - experience_level
        - equipment
        - time_per_workout
        - days_per_week
    Exercise:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [primary, accessory, isolation]
        muscle_group:
          type: string
        sets:
          type: integer
        reps:
          type: integer
        suggested_weight_kg:
          type: number
        rest_seconds:
          type: integer
        description:
          type: string
      required:
        - name
        - category
        - muscle_group
        - sets
        - reps
        - suggested_weight_kg
        - rest_seconds
        - description
    DayPlan:
      type: object
      properties:
        day:
          type: string
        type:
          type: string
          enum: [training, rest]
        title:
          type: string
        estimated_duration:
          type: integer
        intensity:
          type: string
          enum: [low, moderate, high]
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"
      required:
        - day
        - type
        - title
        - estimated_duration
        - intensity
        - exercises
    WeeklyPlan:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DayPlan"
      required:
        - days
    UserProfileResponse:
      type: object
      properties:
        profile:
          oneOf:
            - $ref: "#/components/schemas/GeneratePlanBody"
            - type: "null"
      required:
        - profile
    SetLogged:
      type: object
      properties:
        exercise:
          type: string
        reps:
          type: integer
        weight_kg:
          type: number
      required:
        - exercise
        - reps
        - weight_kg
    LogSessionBody:
      type: object
      properties:
        day:
          type: string
        date:
          type: string
          format: date-time
        duration_seconds:
          type: integer
        sets_logged:
          type: array
          items:
            $ref: "#/components/schemas/SetLogged"
        completed:
          type: boolean
      required:
        - day
        - date
        - duration_seconds
        - sets_logged
        - completed
    WorkoutSession:
      type: object
      properties:
        id:
          type: string
        day:
          type: string
        date:
          type: string
          format: date-time
        duration_seconds:
          type: integer
        sets_logged:
          type: array
          items:
            $ref: "#/components/schemas/SetLogged"
        completed:
          type: boolean
      required:
        - id
        - day
        - date
        - duration_seconds
        - sets_logged
        - completed
    SessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSession"
      required:
        - sessions
    ProgressionChange:
      type: object
      properties:
        exercise:
          type: string
        old_weight_kg:
          type: number
        new_weight_kg:
          type: number
        reason:
          type: string
      required:
        - exercise
        - old_weight_kg
        - new_weight_kg
        - reason
    LogSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/WorkoutSession"
        progression_changes:
          type: array
          items:
            $ref: "#/components/schemas/ProgressionChange"
      required:
        - session
        - progression_changes
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
